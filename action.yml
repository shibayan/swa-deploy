name: Deploy Azure Static Web Apps
description:
  Deploy prebuilt assets to Azure Static Web Apps using StaticSitesClient
author: shibayan

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: upload-cloud
  color: blue

# Define your inputs here.
inputs:
  app_location:
    description: Directory that contains the prebuilt front-end assets to deploy
    required: false
  api_location:
    description: Directory that contains the Azure Functions API to deploy
    required: false
  deployment_token:
    description:
      Deployment token for the target Static Web App. Falls back to
      SWA_CLI_DEPLOYMENT_TOKEN when omitted
    required: false
  environment:
    description: Target deployment environment such as preview or production
    required: false
    default: 'production'
  api_language:
    description:
      Function runtime language for the API, for example node, python, dotnet,
      or dotnetisolated
    required: false
  api_version:
    description: Function runtime version for the API
    required: false

# Define your outputs here.
outputs:
  deployment_url:
    description:
      URL emitted by StaticSitesClient after a successful deployment when
      available

runs:
  using: node24
  main: dist/index.js
  post: dist/index.js
  post-if: always()
